<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2b7489"/>
      <stop offset="100%" style="stop-color:#1a4f5c"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="url(#bg)"/>
  <!-- Git merge/PR icon (simplified) -->
  <g transform="translate(24, 18)" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main vertical line (base branch) -->
    <line x1="20" y1="8" x2="20" y2="84"/>
    <!-- Branch circle (top) -->
    <circle cx="20" cy="8" r="7" fill="#4ec9b0"/>
    <!-- Branch circle (bottom/merge) -->
    <circle cx="20" cy="84" r="7" fill="#4ec9b0"/>
    <!-- Feature branch line -->
    <path d="M 20 28 Q 50 28 60 48" fill="none"/>
    <!-- Feature branch circle -->
    <circle cx="60" cy="48" r="7" fill="#f0c674"/>
    <!-- Merge back arrow -->
    <path d="M 60 55 Q 50 72 27 82" fill="none"/>
    <!-- Check mark on the feature circle -->
    <polyline points="54,48 58,52 66,44" stroke="#1a4f5c" stroke-width="3"/>
  </g>
  <!-- "MCP" label -->
  <text x="64" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#4ec9b0" text-anchor="middle" letter-spacing="2">MCP</text>
</svg>
